- id: chat-cites-when-context-provided
  mode: chat
  prompt: What does this app do?
  context: |
    DClaw Doc is an AI-native document workspace with retrieval-augmented
    generation, paragraph-level citations, CRDT collaboration, and a
    streaming copilot. It runs on FastAPI + SQLAlchemy with SQLite locally
    and Postgres in production.
  # ``app do`` survives both the mock provider (which echoes the prompt) and
  # a real model (which is asked to answer "what does this app do?").
  must_include: ["app do"]
  must_not_include: ["Traceback"]

- id: chat-handles-no-context
  mode: chat
  prompt: Hello copilot
  must_include: []
  must_not_include: ["Traceback"]
