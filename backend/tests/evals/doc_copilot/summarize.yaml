# Golden dataset: copilot summarization
# Each case runs the LLM provider via app.services.llm.get_provider().
# The mock provider always passes because it embeds the prompt in its reply;
# this is fine — these cases are designed to regress the *plumbing*, not the
# model. When you flip AI_PROVIDER to ollama / openrouter, must_include /
# must_not_include start exercising the real model.
- id: summarize-bullets-format
  mode: summarize
  prompt: |
    Summarize the following release notes:
    - Added documents CRUD with workspace scoping
    - Streaming AI copilot with citations
    - Version history with one-click restore
  must_include: ["Summarize", "release notes"]
  must_not_include: ["I cannot"]

- id: summarize-empty-prompt
  mode: summarize
  prompt: " "
  must_include: []
  must_not_include: ["Traceback"]
  expect_status: ok
